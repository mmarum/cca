<h5>Call for muralist</h5>
 
<p>Catalyst Creative Arts to provide a community art mural opportunity for a local DFW artist. </p>

<h5>Mural details:</h5>
<p>8 ft x 12 ft mural that will be displayed fulltime on the exterior of a historic Downtown Arlington building in the heart of the Cultural Arts District; near Theater Arlington, City Hall, Arlington Public Library, and the Levitt Pavilion. Location is 300 W. Main St., Arlington, Texas. (New mural will be replacing Trey Wilder's "Rein Free" mural pictured below.)</p>

<h5>When:</h5>
<p>The selected mural will remain on the mural space until January, 2026. The mural space will display different artist's work each year.</p>

<h5>Selection:</h5>
<p>Artist applicants will be selected by a panel of community members.</p>

<h5>Dates:</h5>
<p>Mural application opens March 5, 2025. Applications will be collected until 6pm, March 23, 2025. Artist and mural selection will be announced 12pm, March 26, 2025. Mural work will be completed by 6pm, April 9, 2025. The muralist will receive $1836 upon completion of the project. ($1536 for work & $300 for material)<l/p>
